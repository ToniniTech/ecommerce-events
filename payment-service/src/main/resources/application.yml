server:
  port: 8082

spring:
  application:
    name: payment-service

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/payment_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER:paymentuser}
    password: ${MYSQL_PASSWORD:paymentpass}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: manual
        retry:
          enabled: true
          initial-interval: 2000
          max-attempts: 3
          multiplier: 2.0
          max-interval: 10000

rabbitmq:
  exchange:
    orders: orders.exchange
    payments: payments.exchange
  queue:
    order-created: payment.service.order-created.queue
    order-created-dlq: payment.service.order-created.dlq
  routing-key:
    order-created: order.created
    payment-processed: payment.processed
    payment-failed: payment.failed

# Payment gateway simulation config
payment:
  gateway:
    success-rate: 0.8       # 80% success rate for simulation
    processing-delay-ms: 500 # Simulate gateway latency

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.ecommerce: DEBUG
    org.springframework.amqp: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [payment-service] %logger{36} - %msg%n"
