server:
  port: 8081

spring:
  application:
    name: order-service



  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/order_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER:orderuser}
    password: ${MYSQL_PASSWORD:orderpass}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: manual
        retry:
          enabled: true
          initial-interval: 2000
          max-attempts: 3
          multiplier: 2.0
          max-interval: 10000

rabbitmq:
  exchange:
    orders: orders.exchange
    payments: payments.exchange
  queue:
    order-created: order.created.queue
    payment-processed: payment.processed.queue
    payment-failed: payment.failed.queue
    order-created-dlq: order.created.dlq
    payment-processed-dlq: payment.processed.dlq
  routing-key:
    order-created: order.created
    payment-processed: payment.processed
    payment-failed: payment.failed

product:
  service:
    url: ${PRODUCT_SERVICE_URL:http://localhost:8085}

auth:
  service:
    url: ${AUTH_SERVICE_URL:http://localhost:8084}

jwt:
  secret: ${JWT_SECRET}

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://${ZIPKIN_HOST:localhost}:9411/api/v2/spans
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.ecommerce: DEBUG
    org.springframework.amqp: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [${spring.application.name},%X{traceId},%X{spanId}] %logger{36} - %msg%n"