server:
  port: 8084

spring:
  application:
    name: auth-service


  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/auth_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER:authuser}
    password: ${MYSQL_PASSWORD:authpass}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

jwt:
  # In production: use a 256-bit random secret stored in a secrets manager (AWS Secrets Manager, Vault)
  # Never hardcode in production — this is for demo only
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:1800000}   # 24 hours
  refresh-expiration-ms: ${JWT_REFRESH_MS:604800000}  # 7 days

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://${ZIPKIN_HOST:localhost}:9411/api/v2/spans
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always


logging:
  level:
    com.ecommerce: DEBUG
    org.springframework.security: INFO
    org.springframework.aop: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [${spring.application.name},%X{traceId},%X{spanId}] %logger{36} - %msg%n"


