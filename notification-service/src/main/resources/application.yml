server:
  port: 8083

spring:
  application:
    name: notification-service

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/notification_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER:notifuser}
    password: ${MYSQL_PASSWORD:notifpass}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: manual
        retry:
          enabled: true
          initial-interval: 2000
          max-attempts: 3
          multiplier: 2.0
          max-interval: 10000

  # Mail config (set MAIL_ENABLED=true + real credentials for actual email)
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:noreply@ecommerce.com}
    password: ${MAIL_PASSWORD:changeme}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

rabbitmq:
  exchange:
    orders: orders.exchange
    payments: payments.exchange
  queue:
    notification-order-created: notification.order-created.queue
    notification-payment-processed: notification.payment-processed.queue
    notification-payment-failed: notification.payment-failed.queue
    notification-order-created-dlq: notification.order-created.dlq
    notification-payment-dlq: notification.payment.dlq
  routing-key:
    order-created: order.created
    payment-processed: payment.processed
    payment-failed: payment.failed

notification:
  mail:
    enabled: ${MAIL_ENABLED:false}  # set to true in prod with real credentials
    from: ${MAIL_FROM:noreply@ecommerce.com}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  health:
    mail:
      enabled: false    # ← deshabilita el check de Gmail

logging:
  level:
    com.ecommerce: DEBUG
    org.springframework.amqp: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [notification-service] %logger{36} - %msg%n"
