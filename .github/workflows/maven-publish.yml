name: CI for ecommerce-events

on:
  push:
    branches: [ technical-upgrades ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - order-service
          - notification-service
          - payment-service
          - product-service
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Build & test ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        run: mvn -B verify
